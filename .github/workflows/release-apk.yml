name: Release APK

# Publishes a debug APK as a GitHub Release asset whenever a version tag is pushed.
# Flow: bump versionName → commit → `git tag vX.Y.Z-debug` → `git push origin vX.Y.Z-debug`
#       → this workflow builds the APK and attaches it to the auto-created release
#       → the in-app update checker (Settings) picks it up via the Releases API.
#
# One-time setup (Felipe): add repo secret GOOGLE_SERVICES_JSON = base64 of
# app/google-services.json. See docs/04_ANDROID/AUTO_UPDATE.md.

on:
  push:
    tags:
      - 'v*'

permissions:
  # Required for softprops/action-gh-release to create the release and upload assets.
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build & Publish APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Hoisted to job scope so step-level `if:` conditions can read it. The secret
    # is mapped here once and reused below.
    env:
      GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
      DEBUG_KEYSTORE_B64: ${{ secrets.DEBUG_KEYSTORE_B64 }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # CRITICAL: sign the released APK with the SAME debug keystore registered
      # in Firebase (SHA-1 A6:04:1D:CF:...). Otherwise the runner auto-generates
      # a random debug keystore → Google Sign-In fails ("no credential available")
      # AND the APK won't install over a previously-installed build (signature
      # mismatch → "package conflict"). We overwrite ~/.android/debug.keystore so
      # Gradle's default debug signing uses Felipe's keystore.
      - name: Use the registered debug keystore
        if: ${{ env.DEBUG_KEYSTORE_B64 != '' }}
        run: |
          # Decode to a known path and point the Gradle debug signingConfig at it
          # via DEBUG_KEYSTORE_PATH (app/build.gradle.kts reads this env var).
          # The previous approach overwrote ~/.android/debug.keystore, which AGP
          # on the runner ignored/regenerated → wrong SHA-1 (f4abd24c…).
          KS="$RUNNER_TEMP/humanos-debug.keystore"
          echo "$DEBUG_KEYSTORE_B64" | base64 --decode > "$KS"
          echo "DEBUG_KEYSTORE_PATH=$KS" >> "$GITHUB_ENV"
          echo "Decoded registered debug keystore ($(wc -c < "$KS") bytes) -> $KS"

      - name: Warn if debug keystore secret is missing
        if: ${{ env.DEBUG_KEYSTORE_B64 == '' }}
        run: |
          echo "::warning::DEBUG_KEYSTORE_B64 secret not set. The runner will auto-generate a random debug keystore — Google Sign-In will fail and the APK won't install as an update. Add the secret (base64 of ~/.android/debug.keystore)."

      # Inject the Firebase config so the released APK has working Google Sign-In.
      # If the secret is absent the build still succeeds (the google-services
      # plugin is applied conditionally on the file's presence — see
      # app/build.gradle.kts), but Firebase auth will not function in that APK.
      - name: Decode google-services.json
        if: ${{ env.GOOGLE_SERVICES_JSON != '' }}
        run: |
          echo "$GOOGLE_SERVICES_JSON" | base64 --decode > app/google-services.json
          echo "Wrote app/google-services.json ($(wc -c < app/google-services.json) bytes)."

      - name: Warn if google-services.json is missing
        if: ${{ env.GOOGLE_SERVICES_JSON == '' }}
        run: |
          echo "::warning::GOOGLE_SERVICES_JSON secret not set. Building WITHOUT Firebase config — Google Sign-In will not work in this APK. Add the secret in repo Settings → Secrets → Actions."

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk "humanOS-${{ github.ref_name }}.apk"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # The release is created (if absent) for the pushed tag, with the APK attached.
          files: humanOS-${{ github.ref_name }}.apk
          name: humanOS Android ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
