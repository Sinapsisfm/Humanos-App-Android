name: Deploy Beta (Firebase App Distribution)

on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # For Workload Identity Federation

jobs:
  distribute:
    name: Build & Distribute Beta
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Only run on develop branch pushes, not PRs
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Option A: Workload Identity Federation (preferred — DEC-005, Q-002)
      # Uncomment when WIF is configured in GCP project humanos-app
      # - id: auth
      #   uses: google-github-actions/auth@v2
      #   with:
      #     workload_identity_provider: 'projects/PROJECT_NUMBER/locations/global/workloadIdentityPools/github-actions-pool/providers/github-oidc'
      #     service_account: 'android-ci@humanos-app.iam.gserviceaccount.com'

      # Option B: Service Account Key (fallback — documented exception per DEC-005)
      # - id: auth
      #   uses: google-github-actions/auth@v2
      #   with:
      #     credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Build release APK
        run: ./gradlew assembleRelease
        # Note: signing config must be set up before this works
        # See docs/05_DEVELOPMENT/RELEASE_CHECKLIST.md

      # - name: Distribute to Firebase App Distribution
      #   uses: wzieba/Firebase-Distribution-Github-Action@v1
      #   with:
      #     appId: ${{ secrets.FIREBASE_APP_ID }}
      #     serviceCredentialsFileContent: ${{ steps.auth.outputs.credentials_file_path }}
      #     groups: internal-testers
      #     file: app/build/outputs/apk/release/app-release.apk
      #     releaseNotes: |
      #       Build ${{ github.sha }}
      #       Branch: ${{ github.ref_name }}

      - name: Upload release APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: humanos-release-apk
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30
